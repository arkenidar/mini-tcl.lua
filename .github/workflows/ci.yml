name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  make:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build and test
        run: make test
      - name: Static build
        run: make static
      - name: Test static binary
        run: sh tests/run-tests.sh ./mini-tcl-static
      - name: Install MinGW
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64
      - name: Windows cross-build
        run: make windows

  cmake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Configure
        run: cmake -B build
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
