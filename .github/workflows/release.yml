name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MinGW
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64
      - name: Build and test
        run: make test
      - name: Build release binaries
        run: make static windows
      - name: Create release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            mini-tcl-static mini-tcl.exe \
            --title "mini-tcl $GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
