name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up emscripten
        uses: mymindstorm/setup-emsdk@v14
      - name: Build the WebAssembly module
        run: make wasm
      - name: Assemble site (docs + WASM module + the interpreter the REPL loads)
        run: |
          mkdir _site
          cp docs/* _site/
          cp mini-tcl.lua canvas.lua tk.lua _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
